<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wfstats</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <p class="eyebrow">wfstats</p>
          <div class="view-switch">
            <button class="view-btn is-active" data-view="relics">Relics</button>
            <button class="view-btn" data-view="mods">Mods</button>
            <button class="view-btn" data-view="syndicate">Syndicate</button>
            <button class="view-btn" data-view="missions">Missions</button>
          </div>
        </div>
        <label class="toggle">
          <input id="vaulted-toggle" type="checkbox" />
          <span>Include vaulted</span>
        </label>
      </header>

      <section class="grid">
        <section class="panel" data-view="relics">
          <div class="panel-head">
            <h2>Relics</h2>
          </div>
          <input id="relic-search" class="search" type="search" placeholder="Search relics" />
          <div id="relic-list" class="card-list"></div>
        </section>

        <section class="panel" data-view="missions">
          <div class="panel-head">
            <h2>Missions</h2>
          </div>
          <input id="mission-search" class="search" type="search" placeholder="Search missions or relics" />
          <div id="mission-list" class="card-list"></div>
        </section>

        <section class="panel is-hidden" data-view="mods">
          <div class="panel-head">
            <h2>Mods</h2>
          </div>
          <input id="mod-search" class="search" type="search" placeholder="Search mods" />
          <details class="filter-menu">
            <summary>Filter Sources</summary>
            <label class="filter-option"><input id="mod-filter-enemy" type="checkbox" checked /> Enemy</label>
            <label class="filter-option"><input id="mod-filter-mission" type="checkbox" checked /> Mission</label>
            <label class="filter-option"><input id="mod-filter-other" type="checkbox" checked /> Other drop</label>
          </details>
          <div id="mod-list" class="card-list"></div>
        </section>

        <section class="panel is-hidden" data-view="syndicate">
          <div class="panel-head">
            <h2>Syndicate Mods</h2>
          </div>
          <input id="syndicate-search" class="search" type="search" placeholder="Search syndicate mods" />
          <select id="syndicate-vendor-filter" class="search">
            <option value="">All syndicates</option>
          </select>
          <div id="syndicate-list" class="card-list"></div>
        </section>
      </section>
    </main>

    <template id="relic-card-template">
      <article class="card">
        <button class="card-button" type="button">
          <div class="card-top">
            <img class="card-image" alt="" />
            <div class="card-main">
              <div class="card-title-row">
                <h3 class="card-title"></h3>
                <span class="pill"></span>
              </div>
              <p class="card-ev"></p>
              <dl class="ev-grid"></dl>
            </div>
          </div>
        </button>
        <div class="card-detail is-hidden">
          <section>
            <h4>Drops</h4>
            <div class="detail-table rewards"></div>
          </section>
          <section>
            <h4>Farm missions</h4>
            <div class="detail-table missions"></div>
          </section>
        </div>
      </article>
    </template>

    <template id="mission-card-template">
      <article class="card mission-card">
        <div class="card-top">
          <div class="card-main">
            <div class="card-title-row">
              <h3 class="card-title"></h3>
              <span class="pill"></span>
            </div>
            <p class="card-ev"></p>
            <p class="card-meta"></p>
          </div>
        </div>
      </article>
    </template>

    <template id="mod-card-template">
      <article class="card">
        <button class="card-button" type="button">
          <div class="card-top">
            <div class="card-main">
              <div class="card-title-row">
                <h3 class="card-title"></h3>
                <span class="pill"></span>
              </div>
              <p class="card-ev"></p>
              <p class="card-meta"></p>
              <div class="tag-row"></div>
            </div>
          </div>
        </button>
        <div class="card-detail is-hidden">
          <section>
            <h4>Price</h4>
            <div class="detail-table mod-prices"></div>
          </section>
          <section>
            <h4>Sources</h4>
            <div class="detail-table mod-sources"></div>
          </section>
        </div>
      </article>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
</html>
